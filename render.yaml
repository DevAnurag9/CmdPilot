services:
  - type: web
    name: cmdpilot-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CMDPILOT_OLLAMA_MODEL
        value: qwen3:4b
      - key: CMDPILOT_DATABASE_URL
        value: /var/data/cmdpilot.db
